{% extends "dialogs/layout.html" %}
{% block dialog_content %}

<h4 class="card-title mb-4 text-center">Data-Driven Complex Form</h4>

<form method="POST" action="/dialog/submit">
  <p>This form receives data from Robot Framework and returns the edited values.</p>

  {% for key, value in data.items() %}
  <div class="mb-3">
    <label class="form-label">{{ key }}</label>
    <input
      type="text"
      class="form-control form-control-lg"
      name="{{ key }}"
      value="{{ value }}">
  </div>
  {% endfor %}

  <div class="d-grid">
    <button type="submit" class="btn btn-primary btn-lg">Send</button>
  </div>
</form>
{% endblock %}
